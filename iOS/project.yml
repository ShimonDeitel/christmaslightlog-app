name: ChristmasLightLog
options:
  bundleIdPrefix: com.shimondeitel.lightloglog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  ChristmasLightLog:
    type: application
    platform: iOS
    sources:
      - path: ChristmasLightLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.lightloglog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ChristmasLightLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ChristmasLightLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChristmasLightLogTests
      - path: ChristmasLightLog.storekit
    dependencies:
      - target: ChristmasLightLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.lightloglog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ChristmasLightLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ChristmasLightLogUITests
    dependencies:
      - target: ChristmasLightLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.lightloglog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  ChristmasLightLog:
    build:
      targets:
        ChristmasLightLog: all
        ChristmasLightLogTests: [test]
        ChristmasLightLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: ChristmasLightLog.storekit
    test:
      config: Debug
      storeKitConfiguration: ChristmasLightLog.storekit
      targets:
        - ChristmasLightLogTests
        - ChristmasLightLogUITests
    archive:
      config: Release
